name: CI

on:
     pull_request:
     push:
       branches: [main]

permissions:
     contents: read

jobs:
     test:
       name: Test and syntax check
       runs-on: ubuntu-latest

       strategy:
         matrix:
           node-version: [20, 22]

       steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Set up Node
           uses: actions/setup-node@v6
           with:
             node-version: ${{ matrix.node-version }}

         - name: Run tests
           run: npm test

         - name: Run syntax check
           run: npm run check
